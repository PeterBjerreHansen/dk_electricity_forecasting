services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.web
    image: dk-energy-forecasts-web:local
    command: ["web"]
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    environment:
      DKENERGY_ARTIFACT_STORE_URI: ${DKENERGY_ARTIFACT_STORE_URI:-file:///app/cloud_store}
      DKENERGY_PANEL_PATH: ${DKENERGY_PANEL_PATH:-file:///app/cloud_store/latest/price_panel_hourly_v1.parquet}
      DKENERGY_DASHBOARD_JSON: ${DKENERGY_DASHBOARD_JSON:-file:///app/cloud_store/latest/forecast_dashboard.json}
      DKENERGY_LATEST_PREDICTIONS_PATH: ${DKENERGY_LATEST_PREDICTIONS_PATH:-file:///app/cloud_store/latest/predictions.parquet}
      DKENERGY_RECENT_PREDICTIONS_PATH: ${DKENERGY_RECENT_PREDICTIONS_PATH:-file:///app/cloud_store/recent_scores/predictions.parquet}
      DKENERGY_RECENT_SCORES_PATH: ${DKENERGY_RECENT_SCORES_PATH:-file:///app/cloud_store/recent_scores/model_scores.parquet}
      DKENERGY_PUBLISHED_HISTORY_PREDICTIONS_PATH: ${DKENERGY_PUBLISHED_HISTORY_PREDICTIONS_PATH:-file:///app/cloud_store/published_forecast_history/predictions.parquet}
      DKENERGY_PUBLISHED_HISTORY_SCORES_PATH: ${DKENERGY_PUBLISHED_HISTORY_SCORES_PATH:-file:///app/cloud_store/published_forecast_history/model_scores.parquet}
      DKENERGY_ENABLE_LEGACY_BACKTESTS: ${DKENERGY_ENABLE_LEGACY_BACKTESTS:-0}
    volumes:
      - ./cloud_store:/app/cloud_store

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    image: dk-energy-forecasts-pipeline:local
    profiles:
      - jobs
    command:
      [
        "pipeline",
        "--artifact-store-uri",
        "${DKENERGY_ARTIFACT_STORE_URI:-file:///app/cloud_store}",
        "--workdir",
        "${DKENERGY_WORKDIR:-/app/runtime}",
      ]
    environment:
      DKENERGY_ARTIFACT_STORE_URI: ${DKENERGY_ARTIFACT_STORE_URI:-file:///app/cloud_store}
      DKENERGY_WORKDIR: ${DKENERGY_WORKDIR:-/app/runtime}
      DKENERGY_MODEL_ARTIFACT_URI: ${DKENERGY_MODEL_ARTIFACT_URI:-file:///app/cloud_store/models/chronos_weather}
      EDS_START: ${EDS_START:-}
      EDS_END: ${EDS_END:-}
      OPEN_METEO_START: ${OPEN_METEO_START:-}
      OPEN_METEO_END: ${OPEN_METEO_END:-}
      FORECAST_AT_HOUR_UTC: ${FORECAST_AT_HOUR_UTC:-}
      FORECAST_LOCAL_TIME: ${FORECAST_LOCAL_TIME:-12:00}
      MIN_TRAIN_DAYS: ${MIN_TRAIN_DAYS:-60}
      SCORE_DAYS: ${SCORE_DAYS:-14}
      SCORE_MAX_ORIGINS: ${SCORE_MAX_ORIGINS:-7}
      SCORE_HOLDOUT_DAYS: ${SCORE_HOLDOUT_DAYS:-2}
      PUBLISH_MODELS: ${PUBLISH_MODELS:-}
      WITH_WEATHER: ${WITH_WEATHER:-1}
    volumes:
      - ./cloud_store:/app/cloud_store
      - ./runtime:/app/runtime
