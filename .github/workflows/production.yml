name: Production Deploy

on:
  workflow_dispatch:
    inputs:
      enable_pipeline_schedule:
        description: Keep the proven daily forecast schedule enabled
        required: true
        default: true
        type: boolean

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: eu-central-1
  ENABLE_PIPELINE_SCHEDULE: ${{ inputs.enable_pipeline_schedule }}

jobs:
  deploy:
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: github-production-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: |
          terraform -chdir=infra/aws init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=dk-energy-forecasts/production.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="use_lockfile=true"

      - name: Validate Terraform
        run: |
          terraform -chdir=infra/aws fmt -check -recursive
          terraform -chdir=infra/aws validate

      - name: Ensure ECR exists
        run: |
          terraform -chdir=infra/aws apply -auto-approve \
            -target=aws_ecr_repository.pipeline \
            -target=aws_ecr_lifecycle_policy.pipeline \
            -var "aws_region=${AWS_REGION}"

      - name: Read ECR repository URLs
        id: ecr
        run: |
          echo "pipeline_repository_url=$(terraform -chdir=infra/aws output -raw pipeline_ecr_repository_url)" >> "$GITHUB_OUTPUT"

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push images
        id: images
        env:
          PIPELINE_IMAGE_URI: ${{ steps.ecr.outputs.pipeline_repository_url }}:${{ github.sha }}
        run: |
          PIPELINE_REPOSITORY="${{ steps.ecr.outputs.pipeline_repository_url }}"
          PIPELINE_REPOSITORY="${PIPELINE_REPOSITORY##*/}"
          if aws ecr describe-images --repository-name "$PIPELINE_REPOSITORY" --image-ids "imageTag=${GITHUB_SHA}" >/dev/null 2>&1; then
            echo "Reusing immutable pipeline image $PIPELINE_IMAGE_URI"
          else
            docker build --build-arg "GIT_SHA=${GITHUB_SHA}" -f Dockerfile.pipeline -t "$PIPELINE_IMAGE_URI" .
            docker push "$PIPELINE_IMAGE_URI"
          fi

          echo "pipeline_image_uri=$PIPELINE_IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Validate deployed Chronos artifact contract
        env:
          PIPELINE_IMAGE_URI: ${{ steps.images.outputs.pipeline_image_uri }}
        run: |
          MODEL_ARTIFACT_URI="$(terraform -chdir=infra/aws output -raw model_artifact_uri)"
          rm -rf /tmp/dkenergy-production-model
          mkdir -p /tmp/dkenergy-production-model
          aws s3 sync "$MODEL_ARTIFACT_URI/" /tmp/dkenergy-production-model/
          docker run --rm \
            --entrypoint python \
            -v /tmp/dkenergy-production-model:/model:ro \
            "$PIPELINE_IMAGE_URI" \
            -c "from dkenergy_forecast.models.chronos_production import load_lora_artifact_manifest; load_lora_artifact_manifest('/model'); print('production model artifact: valid')"

      - name: Terraform apply
        run: |
          terraform -chdir=infra/aws apply -auto-approve \
            -var "aws_region=${AWS_REGION}" \
            -var "build_git_sha=${GITHUB_SHA}" \
            -var "pipeline_image_uri=${{ steps.images.outputs.pipeline_image_uri }}" \
            -var "enable_pipeline_schedule=${ENABLE_PIPELINE_SCHEDULE}"
