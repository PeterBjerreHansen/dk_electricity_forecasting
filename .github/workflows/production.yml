name: Production Deploy

on:
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: eu-central-1
  ENABLE_PIPELINE_SCHEDULE: ${{ vars.ENABLE_PIPELINE_SCHEDULE || 'false' }}
  ENABLE_PUBLISHED_SCORING_SCHEDULE: ${{ vars.ENABLE_PUBLISHED_SCORING_SCHEDULE || 'false' }}
  ENABLE_WEB: ${{ vars.ENABLE_WEB || 'false' }}
  ALERT_EMAIL_ENDPOINT: ${{ vars.ALERT_EMAIL_ENDPOINT || '' }}

jobs:
  deploy:
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: |
          terraform -chdir=infra/aws init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=dk-energy-forecasts/production.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="use_lockfile=true"

      - name: Validate Terraform
        run: |
          terraform -chdir=infra/aws fmt -check -recursive
          terraform -chdir=infra/aws validate

      - name: Ensure ECR exists
        run: |
          terraform -chdir=infra/aws apply -auto-approve \
            -target=aws_ecr_repository.pipeline \
            -target=aws_ecr_lifecycle_policy.pipeline \
            -var "aws_region=${AWS_REGION}" \
            -var "enable_web=${ENABLE_WEB}"
          if [ "${ENABLE_WEB}" = "true" ]; then
            terraform -chdir=infra/aws apply -auto-approve \
              -target='aws_ecr_repository.web[0]' \
              -target='aws_ecr_lifecycle_policy.web[0]' \
              -var "aws_region=${AWS_REGION}" \
              -var "enable_web=true"
          fi

      - name: Read ECR repository URLs
        id: ecr
        run: |
          if [ "${ENABLE_WEB}" = "true" ]; then
            echo "web_repository_url=$(terraform -chdir=infra/aws output -raw web_ecr_repository_url)" >> "$GITHUB_OUTPUT"
          fi
          echo "pipeline_repository_url=$(terraform -chdir=infra/aws output -raw pipeline_ecr_repository_url)" >> "$GITHUB_OUTPUT"

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push images
        id: images
        env:
          WEB_IMAGE_URI: ${{ steps.ecr.outputs.web_repository_url }}:${{ github.sha }}
          PIPELINE_IMAGE_URI: ${{ steps.ecr.outputs.pipeline_repository_url }}:${{ github.sha }}
        run: |
          if [ "${ENABLE_WEB}" = "true" ]; then
            WEB_REPOSITORY="${{ steps.ecr.outputs.web_repository_url }}"
            WEB_REPOSITORY="${WEB_REPOSITORY##*/}"
            if aws ecr describe-images --repository-name "$WEB_REPOSITORY" --image-ids "imageTag=${GITHUB_SHA}" >/dev/null 2>&1; then
              echo "Reusing immutable web image $WEB_IMAGE_URI"
            else
              docker build --build-arg "GIT_SHA=${GITHUB_SHA}" -f Dockerfile.web -t "$WEB_IMAGE_URI" .
              docker push "$WEB_IMAGE_URI"
            fi
          else
            WEB_IMAGE_URI=bootstrap
          fi

          PIPELINE_REPOSITORY="${{ steps.ecr.outputs.pipeline_repository_url }}"
          PIPELINE_REPOSITORY="${PIPELINE_REPOSITORY##*/}"
          if aws ecr describe-images --repository-name "$PIPELINE_REPOSITORY" --image-ids "imageTag=${GITHUB_SHA}" >/dev/null 2>&1; then
            echo "Reusing immutable pipeline image $PIPELINE_IMAGE_URI"
          else
            docker build --build-arg "GIT_SHA=${GITHUB_SHA}" -f Dockerfile.pipeline -t "$PIPELINE_IMAGE_URI" .
            docker push "$PIPELINE_IMAGE_URI"
          fi

          echo "web_image_uri=$WEB_IMAGE_URI" >> "$GITHUB_OUTPUT"
          echo "pipeline_image_uri=$PIPELINE_IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Validate deployed Chronos artifact contract
        if: env.ENABLE_PIPELINE_SCHEDULE == 'true'
        env:
          PIPELINE_IMAGE_URI: ${{ steps.images.outputs.pipeline_image_uri }}
        run: |
          MODEL_ARTIFACT_URI="$(terraform -chdir=infra/aws output -raw model_artifact_uri)"
          rm -rf /tmp/dkenergy-production-model
          mkdir -p /tmp/dkenergy-production-model
          aws s3 sync "$MODEL_ARTIFACT_URI/" /tmp/dkenergy-production-model/
          docker run --rm \
            --entrypoint python \
            -v /tmp/dkenergy-production-model:/model:ro \
            "$PIPELINE_IMAGE_URI" \
            -c "from dkenergy_forecast.models.chronos_production import load_lora_artifact_manifest; load_lora_artifact_manifest('/model'); print('production model artifact: valid')"

      - name: Terraform apply
        run: |
          terraform -chdir=infra/aws apply -auto-approve \
            -var "aws_region=${AWS_REGION}" \
            -var "build_git_sha=${GITHUB_SHA}" \
            -var "web_image_uri=${{ steps.images.outputs.web_image_uri }}" \
            -var "pipeline_image_uri=${{ steps.images.outputs.pipeline_image_uri }}" \
            -var "enable_web=${ENABLE_WEB}" \
            -var "enable_pipeline_schedule=${ENABLE_PIPELINE_SCHEDULE}" \
            -var "enable_published_scoring_schedule=${ENABLE_PUBLISHED_SCORING_SCHEDULE}" \
            -var "alert_email_endpoint=${ALERT_EMAIL_ENDPOINT}"
