name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Run lint
        run: python -m ruff check .

      - name: Run tests
        run: python -m pytest

      - name: Compile importable Python sources
        run: python -m compileall -q src scripts app

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Check formatting
        run: terraform -chdir=infra/aws fmt -check -recursive

      - name: Initialize providers without a backend
        run: terraform -chdir=infra/aws init -backend=false

      - name: Validate configuration
        run: terraform -chdir=infra/aws validate

  container-builds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build dashboard image
        run: docker build --file Dockerfile.web --tag dk-energy-forecasts-web:ci .

      - name: Build production pipeline image
        run: docker build --file Dockerfile.pipeline --tag dk-energy-forecasts-pipeline:ci .

      - name: Smoke-test pipeline command wiring
        run: >-
          docker run --rm
          dk-energy-forecasts-pipeline:ci
          pipeline
          --artifact-store-uri file:///tmp/cloud_store
          --model-artifact-uri file:///tmp/missing-model
          --workdir /tmp/runtime
          --dry-run
